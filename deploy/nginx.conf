# ai.xl.net — served exclusively through the Cloudflare tunnel.
# nginx binds to loopback only; cloudflared connects to 127.0.0.1:80
# and Cloudflare terminates TLS at the edge (same model as itsupportchicago).

server {
    listen 127.0.0.1:80 default_server;
    server_name ai.xl.net;

    # cloudflared handles TLS termination; recover the real client IP
    set_real_ip_from 127.0.0.1;
    real_ip_header CF-Connecting-IP;

    # Next.js site
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Static assets from Next.js
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Twilio webhooks + media-stream WebSocket for the brain.
    # ONLY /brain/twilio/ is exposed publicly — the brain runs in open-gate
    # mode (no API keys), so the rest of its API must stay loopback-only.
    # These endpoints validate the X-Twilio-Signature header themselves.
    location /brain/twilio/ {
        proxy_pass http://127.0.0.1:3211/twilio/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Media-stream WebSocket stays open for the duration of a call
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/aiwebsite.access.log;
    error_log /var/log/nginx/aiwebsite.error.log;
}
