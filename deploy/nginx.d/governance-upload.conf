# Host nginx drop-in (module v1.4.0 mechanism: installed to
# /etc/nginx/aiwebsite.d/ by setup-vm.sh before the conf test).
#
# The governance format-sample upload (§5.12) accepts files up to 2 MB
# (CAPS.styleSampleFileMaxBytes); nginx's 1 MB default would 413 anything
# between 1 and 2 MB before the route ever saw it. 3m leaves headroom for
# multipart framing. Applies server-wide: every other route only ever
# receives small JSON bodies, which this does not loosen meaningfully.
client_max_body_size 3m;
