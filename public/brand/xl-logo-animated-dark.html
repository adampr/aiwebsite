  .runner {
    position: absolute; top: 58%; width: 34%; aspect-ratio: 1;
    transform: translate(-50%, -50%); border-radius: 50%;
    background: radial-gradient(circle, #FFFFFF 0%, #7FD4FF 30%, rgba(127,212,255,0) 70%);
    animation: wm-run 6s linear infinite;
  }
  @keyframes wm-run { 0% { left: -12%; opacity: 0; } 5% { opacity: 1; } 92% { opacity: 1; } 100% { left: 104%; opacity: 0; } }
  @keyframes logo-pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.25; } }
  @keyframes logo-orbit-move { from { offset-distance: 0%; } to { offset-distance: 100%; } }
  .pulse { animation: logo-pulse 7s ease-in-out infinite; }
  .traveler { offset-path: path('M 4 60 A 56 18 0 0 0 116 60 A 56 18 0 0 0 4 60'); animation: logo-orbit-move 14s linear infinite; }
  @media (prefers-reduced-motion: reduce) { .runner, .pulse, .traveler { animation: none; } .runner { display: none; } }
  /* Small embeds (~294-342px iframes): shrink the lockup so the full wordmark fits. */
  @media (max-width: 480px) {
    .lockup { padding: 16px; }
    .orb { width: clamp(72px, 18vw, 130px); }
    .wm { width: min(400px, 55vw); }
  }
</style>

      </linearGradient>
      <linearGradient id="swoosh" x1="0" y1="1" x2="1" y2="0">
        <stop offset="0" stop-color="#A5DBEC" stop-opacity="0.15"/>
        <stop offset="0.6" stop-color="#A5DBEC"/>

      <filter id="glowBig" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="5"/></filter>
      <clipPath id="sphere"><circle cx="60" cy="60" r="34"/></clipPath>
    </defs>
    <g transform="translate(8,20)">
      <circle cx="60" cy="60" r="34" stroke="#46525C" stroke-width="1.5"/>
      <circle cx="60" cy="60" r="34" fill="#A5DBEC" fill-opacity="0.04"/>

        <path d="M 30 78 Q 54 22 90 54" stroke="url(#swoosh)" stroke-width="4" stroke-linecap="round"/>
      </g>
      <g transform="rotate(-20 60 60)">
        <path d="M 4 60 A 56 18 0 0 1 116 60" stroke="#46525C" stroke-width="1"/>
        <path d="M 4 60 A 56 18 0 0 0 116 60" stroke="url(#ring)" stroke-width="6" filter="url(#glow)" opacity="0.5"/>
        <path d="M 4 60 A 56 18 0 0 0 116 60" stroke="url(#ring)" stroke-width="2.5"/>
        <circle class="traveler" r="5" fill="#A5DBEC" filter="url(#glowBig)"/>
        <circle class="traveler" r="2" fill="#FFFFFF"/>
      </g>
